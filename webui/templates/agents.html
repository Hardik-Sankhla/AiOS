<h2>Registered Agents</h2>
<div class="agents-grid">
    {% for agent in agents %}
    <div class="agent-card">
        <h3>{{ agent.name }}</h3>
        <p>{{ agent.description }}</p>
        <div class="agent-info">
            <strong>Capabilities:</strong>
            <span class="capabilities">{{ agent.capabilities | join(', ') }}</span>
        </div>
        <div class="agent-stats">
            <span>Tasks Completed: <strong>{{ agent.tasks_completed }}</strong></span>
            <span>Memory Items: <strong>{{ agent.memory_items }}</strong></span>
        </div>
        <button class="agent-select" hx-post="/api/chat" hx-target="#messages">
            Use {{ agent.name }}
        </button>
    </div>
    {% endfor %}
</div>

<style>
    .agents-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }
    .agent-card {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .agent-card h3 {
        margin-bottom: 10px;
        font-size: 1.3em;
    }
    .agent-card p {
        margin-bottom: 15px;
        opacity: 0.9;
    }
    .agent-info {
        background: rgba(0,0,0,0.2);
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 15px;
        font-size: 0.9em;
    }
    .capabilities {
        display: block;
        margin-top: 5px;
        font-style: italic;
    }
    .agent-stats {
        display: flex;
        justify-content: space-between;
        font-size: 0.9em;
        margin-bottom: 15px;
    }
    .agent-select {
        width: 100%;
        padding: 10px;
        background: white;
        color: #667eea;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
    }
    .agent-select:hover {
        background: #f0f0f0;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
</style>
